<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NouRion · Contracts / العقود</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Cormorant+Garamond:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void:#0A0A0B; --bg-ebony:#121315; --bg-carbon:#1A1C20; --bg-ink:#22252A;
    --silver:#B8BCC2; --silver-bright:#E8ECEF; --silver-deep:#6A7075;
    --cyan:#3FA2E0; --amber:#D4A35A; --coral:#E63946; --green:#10B981;
    --text-primary:#EAECEE; --text-soft:#8A8F95; --text-muted:#4E5358;
    --border:rgba(184,188,194,0.15); --border-bright:rgba(184,188,194,0.32);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg-void);color:var(--text-primary);min-height:100vh;font-variant-numeric:lining-nums;font-feature-settings:"lnum" 1;position:relative}
  body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(rgba(184,188,194,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(184,188,194,0.025) 1px,transparent 1px),linear-gradient(rgba(184,188,194,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(184,188,194,0.015) 1px,transparent 1px);
    background-size:80px 80px,80px 80px,20px 20px,20px 20px;
    mask-image:radial-gradient(ellipse at center,black 20%,transparent 85%);
    -webkit-mask-image:radial-gradient(ellipse at center,black 20%,transparent 85%)}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse 900px 600px at 15% 0%,rgba(184,188,194,0.06) 0%,transparent 50%),radial-gradient(ellipse 700px 500px at 100% 100%,rgba(63,162,224,0.04) 0%,transparent 55%)}
  main,nav,.modal-bg{position:relative;z-index:2}

  nav{position:sticky;top:0;z-index:50;padding:18px 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,11,.78);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border)}
  .nav-brand{display:flex;align-items:center;gap:14px;font-size:18px;font-weight:300;letter-spacing:2px;direction:ltr}
  .nav-brand svg{width:30px;height:30px}
  .nav-brand .name-text{font-weight:500;letter-spacing:.5px}
  .nav-brand .r{font-weight:600;background:linear-gradient(180deg,var(--silver-bright) 0%,var(--silver-deep) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .nav-divider{width:1px;height:18px;background:var(--border);margin:0 10px}
  .nav-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-soft);letter-spacing:2.5px;text-transform:uppercase}
  .tabs{display:flex;gap:6px;align-items:center}
  .tabs a{font-family:'JetBrains Mono',monospace;color:var(--text-soft);text-decoration:none;padding:8px 14px;border-radius:8px;font-size:10.5px;font-weight:500;letter-spacing:2px;text-transform:uppercase;transition:.2s}
  .tabs a:hover{color:var(--silver-bright);background:rgba(184,188,194,.04)}
  .tabs a.active{color:var(--silver-bright);background:rgba(184,188,194,.06);border:1px solid var(--border)}
  .nav-right{display:flex;align-items:center;gap:16px}
  .lang-switcher{display:inline-flex;background:rgba(184,188,194,.04);border:1px solid var(--border);border-radius:100px;padding:3px;gap:2px}
  .lang-btn{padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text-soft);background:transparent;border:none;border-radius:100px;cursor:pointer;transition:.2s}
  .lang-btn:hover{color:var(--text-primary)}
  .lang-btn.active{background:linear-gradient(180deg,var(--silver-bright) 0%,var(--silver) 100%);color:var(--bg-void)}

  main{max-width:1320px;margin:0 auto;padding:40px 32px 80px}
  .page-head{margin-bottom:28px}
  .section-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--silver);display:inline-flex;align-items:center;gap:14px;margin-bottom:14px}
  .section-label .line{width:40px;height:1px;background:linear-gradient(90deg,var(--silver),transparent)}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:400;line-height:1;letter-spacing:-1px;margin-bottom:10px;color:var(--text-primary)}
  .page-title em{font-style:italic;font-weight:500;background:linear-gradient(180deg,var(--silver-bright) 0%,var(--silver) 55%,var(--silver-deep) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .page-sub{color:var(--text-soft);font-size:14px;font-weight:300;max-width:700px;line-height:1.6}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;background:var(--bg-ebony);padding:16px;border-radius:14px;border:1px solid var(--border)}
  input,select,textarea{padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:'Manrope',sans-serif;font-size:13px;background:var(--bg-carbon);color:var(--text-primary);min-width:160px;transition:.2s;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--silver);background:var(--bg-ink)}
  input::placeholder,textarea::placeholder{color:var(--text-muted)}
  .count-pill{font-family:'JetBrains Mono',monospace;color:var(--text-soft);font-size:11px;letter-spacing:1.5px;padding:6px 14px;border:1px solid var(--border);border-radius:100px}

  .btn{padding:10px 20px;background:linear-gradient(180deg,var(--silver-bright) 0%,var(--silver) 55%,var(--silver-deep) 100%);color:var(--bg-void);font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:8px;cursor:pointer;transition:.3s;display:inline-flex;align-items:center;gap:8px}
  .btn:hover{box-shadow:0 0 24px rgba(184,188,194,.35);transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--text-primary);border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px}
  .btn-ghost:hover{border-color:var(--silver);color:var(--silver-bright);background:rgba(184,188,194,.05);box-shadow:none}
  .btn-outline{background:transparent;color:var(--silver-bright);border:1px solid var(--silver-deep)}
  .btn-outline:hover{border-color:var(--silver);background:rgba(184,188,194,.05);box-shadow:none}
  .btn-danger{background:transparent;color:var(--coral);border:1px solid rgba(230,57,70,.35)}
  .btn-danger:hover{background:rgba(230,57,70,.1);box-shadow:0 0 12px rgba(230,57,70,.25)}
  .btn-success{background:linear-gradient(180deg,#34D399 0%,var(--green) 100%);color:var(--bg-void)}
  .btn-success:hover{box-shadow:0 0 20px rgba(16,185,129,.35)}
  .btn-sm{padding:6px 12px;font-size:10.5px;letter-spacing:1px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .card{background:var(--bg-ebony);border:1px solid var(--border);border-radius:14px;padding:20px;transition:.3s;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--silver-deep),transparent);opacity:.4}
  .card:hover{border-color:var(--border-bright);box-shadow:0 10px 40px rgba(0,0,0,.4);transform:translateY(-2px)}
  .c-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .c-num{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--silver-bright);font-size:13px;letter-spacing:2px}
  .badge{display:inline-block;padding:4px 11px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1px solid transparent}
  .b-draft{background:rgba(138,143,149,.12);color:var(--text-soft);border-color:var(--border)}
  .b-active{background:rgba(63,162,224,.12);color:var(--cyan);border-color:rgba(63,162,224,.3)}
  .b-completed{background:rgba(16,185,129,.12);color:var(--green);border-color:rgba(16,185,129,.3)}
  .b-cancelled{background:rgba(230,57,70,.12);color:var(--coral);border-color:rgba(230,57,70,.3)}
  .b-pending{background:rgba(138,143,149,.12);color:var(--text-soft);border-color:var(--border)}
  .b-invoiced{background:rgba(212,163,90,.12);color:var(--amber);border-color:rgba(212,163,90,.3)}
  .b-paid{background:rgba(16,185,129,.12);color:var(--green);border-color:rgba(16,185,129,.3)}

  .c-customer{font-weight:500;margin-bottom:6px;color:var(--text-primary);font-size:15px}
  .c-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-soft);margin-bottom:12px;letter-spacing:1px}
  .c-value{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400;letter-spacing:-1px;line-height:1;background:linear-gradient(180deg,var(--silver-bright) 0%,var(--silver-deep) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
  .c-value .suffix{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--text-soft);-webkit-text-fill-color:var(--text-soft);margin-left:6px;vertical-align:middle}
  .progress-wrap{height:6px;background:var(--bg-carbon);border-radius:99px;overflow:hidden;margin-top:10px;border:1px solid var(--border)}
  .progress{height:100%;background:linear-gradient(90deg,var(--silver-deep),var(--silver),var(--silver-bright));transition:.6s;box-shadow:0 0 10px rgba(184,188,194,.4)}
  .c-progress-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-soft);margin-top:8px;letter-spacing:1px;display:flex;justify-content:space-between}
  .c-actions{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border)}

  .modal-bg{position:fixed;inset:0;background:rgba(10,10,11,.82);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding:48px 20px;z-index:200;overflow-y:auto}
  .modal-bg.open{display:flex}
  .modal{background:var(--bg-ebony);border:1px solid var(--border);border-radius:16px;max-width:820px;width:100%;padding:32px;box-shadow:0 30px 90px rgba(0,0,0,.6)}
  .modal h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;letter-spacing:-.5px;margin-bottom:18px;color:var(--silver-bright)}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-soft);display:block;margin-bottom:6px;margin-top:12px}

  .sched-tbl{width:100%;margin-top:10px;font-size:12px;border-collapse:collapse}
  .sched-tbl th,.sched-tbl td{padding:8px;border:1px solid var(--border);background:var(--bg-carbon)}
  .sched-tbl th{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--text-soft);text-transform:uppercase;text-align:start}
  .sched-tbl input,.sched-tbl select{padding:6px 8px;font-size:12px;min-width:0}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;flex-wrap:wrap;padding-top:20px;border-top:1px solid var(--border)}
  .num{font-family:'JetBrains Mono',monospace;font-weight:500;font-variant-numeric:tabular-nums;direction:ltr !important;unicode-bidi:isolate}

  .detail-sec{margin-top:16px;padding:16px;background:var(--bg-carbon);border-radius:10px;border:1px solid var(--border)}
  .detail-sec h4{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--silver);margin-bottom:12px}
  .detail-sec em{color:var(--text-muted);font-style:normal;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px}

  body.lang-ar,body.lang-ar .modal,body.lang-ar .page-title,body.lang-ar .page-sub,body.lang-ar .tabs a,body.lang-ar .nav-label,body.lang-ar label,body.lang-ar .btn,body.lang-ar .btn-ghost,body.lang-ar .badge,body.lang-ar th,body.lang-ar td,body.lang-ar .section-label,body.lang-ar input,body.lang-ar select,body.lang-ar textarea,body.lang-ar .c-customer,body.lang-ar .c-meta{font-family:'Cairo','Manrope',sans-serif}
  body.lang-ar .page-title,body.lang-ar .page-sub,body.lang-ar .modal h2,body.lang-ar label{direction:rtl;unicode-bidi:isolate}
  body.lang-ar .num{direction:ltr !important;font-family:'JetBrains Mono',monospace}

  @media(max-width:900px){.tabs{display:none}main{padding:24px 16px 60px}.grid-2{grid-template-columns:1fr}nav{padding:14px 20px}}
</style>
</head>

<script>
const API = (localStorage.getItem('SRV_PROXY') || 'http://localhost:3001') + '/api/contracts';
const M   = window.NRContractsModel;
const LS  = 'pm_contracts';

const SEED = [{
  id:'ctr_seed1', number:'C-0001', status:'active',
  parties:{customer:{name:'شركة الفجر للمقاولات'}, company:{name:'NouRion Aluminum', vat:'310000000000003'}},
  value:120000, down_payment:36000,
  payment_schedule:[
    {name:'Down Payment', pct:30, amount:36000, due_date:'2026-03-01', status:'paid'},
    {name:'On Installation', pct:40, amount:48000, due_date:'2026-04-15', status:'invoiced'},
    {name:'On Delivery', pct:30, amount:36000, due_date:'2026-05-15', status:'pending'},
  ],
  terms:'', signed_date:'2026-02-25', start_date:'2026-03-01', end_date:'2026-05-30',
  attached_quote_id:'quote_seed1', project_id:null,
  extracts:[{id:'ext_1', name:'First Extract', pct:30, amount:36000, registered_at:'2026-03-01', status:'paid'}],
  payments:[{id:'pay_1', amount:36000, method:'bank', ref:'WT-1123', at:'2026-03-02T09:00:00Z', note:'Down payment'}],
  createdAt:'2026-02-25', updatedAt:'2026-03-02',
}];

let STATE = { list:[], editing:null };

async function loadList(){
  try { const r = await fetch(API); if (r.ok) STATE.list = await r.json(); else throw 0; }
  catch(_) { const s = localStorage.getItem(LS); STATE.list = s? JSON.parse(s) : SEED.slice(); }
  if(!STATE.list.length) STATE.list = SEED.slice();
  render();
}
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function render(){
  const g = document.getElementById('grid');
  const f = { s:document.getElementById('fSearch').value.toLowerCase(), st:document.getElementById('fStatus').value };
  const rows = STATE.list.filter(c => {
    if (f.st && c.status!==f.st) return false;
    if (f.s  && !(c.parties?.customer?.name||'').toLowerCase().includes(f.s)) return false;
    return true;
  });
  const tot = rows.reduce((a,c)=>a+(c.value||0),0);
  document.getElementById('stats').textContent = `${rows.length} contracts · ${tot.toLocaleString()} SAR`;
  g.innerHTML = rows.length ? rows.map(c => {
    const paid = M.sumPaid(c), pct = M.progress(c), rem = M.remaining(c);
    return `<div class="card">
      <div class="c-head">
        <span class="c-num">${esc(c.number||'')}</span>
        <span class="badge b-${c.status}">${c.status}</span>
      </div>
      <div class="c-customer">${esc(c.parties?.customer?.name||'—')}</div>
      <div class="c-meta">${c.start_date||'—'} → ${c.end_date||'—'}</div>
      <div class="c-value"><span class="num">${(c.value||0).toLocaleString()}</span><span class="suffix">SAR</span></div>
      <div class="progress-wrap"><div class="progress" style="width:${pct}%"></div></div>
      <div class="c-progress-meta">
        <span>PAID <span class="num">${paid.toLocaleString()}</span></span>
        <span>REMAINING <span class="num">${rem.toLocaleString()}</span></span>
        <span class="num">${pct}%</span>
      </div>
      <div class="c-actions">
        <button class="btn btn-ghost btn-sm" onclick="openDetail('${c.id}')" data-i18n="btn_details">Details</button>
        <button class="btn btn-ghost btn-sm" onclick="editRow('${c.id}')" data-i18n="btn_edit">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="del('${c.id}')" data-i18n="btn_delete">Delete</button>
      </div>
    </div>`;
  }).join('') : '<div style="padding:60px;color:var(--text-muted);text-align:center;grid-column:1/-1;font-family:\'JetBrains Mono\',monospace;letter-spacing:2px;text-transform:uppercase;font-size:11px">No contracts</div>';
}

function openModal(c){
  STATE.editing = c ? JSON.parse(JSON.stringify(c)) : M.normalize({}, String(STATE.list.length+1).padStart(4,'0'));
  const e = STATE.editing;
  document.getElementById('mTitle').textContent = c ? 'Edit Contract ' + e.number : 'New Contract';
  document.getElementById('cName').value   = e.parties?.customer?.name||'';
  document.getElementById('cComp').value   = e.parties?.company?.name||'';
  document.getElementById('cValue').value  = e.value||0;
  document.getElementById('cDown').value   = e.down_payment||0;
  document.getElementById('cNumber').value = e.number||'';
  document.getElementById('cSigned').value = e.signed_date||'';
  document.getElementById('cStart').value  = e.start_date||'';
  document.getElementById('cEnd').value    = e.end_date||'';
  document.getElementById('cQuote').value  = e.attached_quote_id||'';
  document.getElementById('cProj').value   = e.project_id||'';
  document.getElementById('cTerms').value  = e.terms||'';
  if (!e.payment_schedule?.length) e.payment_schedule = [{name:'Down', pct:30, amount:0, due_date:'', status:'pending'}];
  renderSched();
  document.getElementById('mEdit').classList.add('open');
}
function closeModal(){ document.getElementById('mEdit').classList.remove('open'); }

function renderSched(){
  const tb = document.querySelector('#schedTbl tbody');
  tb.innerHTML = STATE.editing.payment_schedule.map((r,i)=>`
    <tr>
      <td><input value="${esc(r.name||'')}" oninput="editSched(${i},'name',this.value)" dir="auto"></td>
      <td><input type="number" step="0.01" value="${r.pct||0}" oninput="editSched(${i},'pct',this.value)"></td>
      <td><input type="number" step="0.01" value="${r.amount||0}" oninput="editSched(${i},'amount',this.value)"></td>
      <td><input type="date" value="${r.due_date||''}" oninput="editSched(${i},'due_date',this.value)"></td>
      <td><select onchange="editSched(${i},'status',this.value)">
        ${['pending','invoiced','paid'].map(s=>`<option ${r.status===s?'selected':''} value="${s}">${s}</option>`).join('')}
      </select></td>
      <td><button class="btn btn-ghost btn-sm" onclick="rmSched(${i})">×</button></td>
    </tr>`).join('');
}
function editSched(i,k,v){ STATE.editing.payment_schedule[i][k]=(k==='pct'||k==='amount')?Number(v)||0:v; }
function addSched(){ STATE.editing.payment_schedule.push({name:'', pct:0, amount:0, due_date:'', status:'pending'}); renderSched(); }
function rmSched(i){ STATE.editing.payment_schedule.splice(i,1); renderSched(); }

async function saveContract(){
  const e = STATE.editing;
  e.parties = { customer:{name:document.getElementById('cName').value}, company:{name:document.getElementById('cComp').value}};
  e.value = +document.getElementById('cValue').value||0;
  e.down_payment = +document.getElementById('cDown').value||0;
  e.signed_date = document.getElementById('cSigned').value||null;
  e.start_date  = document.getElementById('cStart').value||null;
  e.end_date    = document.getElementById('cEnd').value||null;
  e.attached_quote_id = document.getElementById('cQuote').value||null;
  e.project_id  = document.getElementById('cProj').value||null;
  e.terms       = document.getElementById('cTerms').value;
  const v = M.validate(e); if(!v.ok){ alert(v.errors.join('\n')); return; }
  try {
    const isExisting = e.id && !e.id.endsWith('_seed1');
    const r = await fetch(isExisting?`${API}/${e.id}`:API, {method:isExisting?'PATCH':'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(e)});
    const saved = await r.json();
    const i = STATE.list.findIndex(x=>x.id===saved.id); if(i>=0) STATE.list[i]=saved; else STATE.list.push(saved);
  } catch(_){
    if(!e.id) e.id='ctr_'+Date.now();
    const i = STATE.list.findIndex(x=>x.id===e.id); if(i>=0) STATE.list[i]=e; else STATE.list.push(e);
    localStorage.setItem(LS, JSON.stringify(STATE.list));
  }
  closeModal(); render();
}
function editRow(id){ const c=STATE.list.find(x=>x.id===id); if(c) openModal(c); }
async function del(id){
  if(!confirm('Delete this contract?')) return;
  try{ await fetch(`${API}/${id}`,{method:'DELETE'}); }catch(_){}
  STATE.list = STATE.list.filter(x=>x.id!==id);
  localStorage.setItem(LS, JSON.stringify(STATE.list));
  render();
}

function openDetail(id){
  const c = STATE.list.find(x=>x.id===id); if(!c) return;
  const body = document.getElementById('detailBody');
  body.innerHTML = `
    <h2>${esc(c.number)} · ${esc(c.parties?.customer?.name||'')}</h2>
    <p style="color:var(--text-soft);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px">VALUE <b class="num" style="color:var(--silver-bright)">${(c.value||0).toLocaleString()} SAR</b> · PAID <b class="num" style="color:var(--green)">${M.sumPaid(c).toLocaleString()}</b> · REMAINING <b class="num" style="color:var(--amber)">${M.remaining(c).toLocaleString()}</b></p>
    <div class="detail-sec">
      <h4>Payment Schedule</h4>
      <table class="sched-tbl"><thead><tr><th>Item</th><th>%</th><th>Amount</th><th>Due</th><th>Status</th></tr></thead>
        <tbody>${(c.payment_schedule||[]).map(r=>`<tr><td>${esc(r.name)}</td><td class="num">${r.pct}</td><td class="num">${(r.amount||0).toLocaleString()}</td><td class="num">${r.due_date||''}</td><td><span class="badge b-${r.status}">${r.status}</span></td></tr>`).join('')}</tbody>
      </table>
    </div>
    <div class="detail-sec">
      <h4>Extracts</h4>
      ${(c.extracts||[]).map(e=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">${esc(e.name)} · <span class="num">${e.pct}%</span> · <span class="num">${(e.amount||0).toLocaleString()}</span> · <span class="badge b-${e.status}">${e.status}</span></div>`).join('') || '<em>None yet</em>'}
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <input id="extName" placeholder="Extract name" dir="auto" style="min-width:140px">
        <input id="extPct" type="number" placeholder="%" style="width:80px;min-width:0">
        <input id="extAmt" type="number" placeholder="Amount" style="width:140px;min-width:0">
        <button class="btn btn-sm" onclick="registerExtract('${c.id}')">Register</button>
      </div>
    </div>
    <div class="detail-sec">
      <h4>Payments</h4>
      ${(c.payments||[]).map(p=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span class="num">${(p.at||'').slice(0,10)}</span> · <span class="num" style="color:var(--green)">${(p.amount||0).toLocaleString()}</span> SAR · ${esc(p.method)} ${esc(p.ref?'('+p.ref+')':'')}</div>`).join('') || '<em>None yet</em>'}
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <input id="payAmt" type="number" placeholder="Amount" style="width:140px;min-width:0">
        <input id="payMethod" placeholder="Method" dir="auto" style="min-width:120px">
        <input id="payRef" placeholder="Ref" dir="auto" style="min-width:120px">
        <button class="btn btn-success btn-sm" onclick="recordPayment('${c.id}')">Record</button>
      </div>
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="document.getElementById('mDetail').classList.remove('open')">Close</button></div>
  `;
  document.getElementById('mDetail').classList.add('open');
}
async function registerExtract(id){
  const body = { name:document.getElementById('extName').value||'Extract', pct:+document.getElementById('extPct').value||0, amount:+document.getElementById('extAmt').value||0 };
  try { const r = await fetch(`${API}/${id}/register-extract`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); const out = await r.json(); if(out.contract){ const i=STATE.list.findIndex(x=>x.id===id); STATE.list[i]=out.contract;} }
  catch(_){ const c = STATE.list.find(x=>x.id===id); c.extracts=c.extracts||[]; c.extracts.push({id:'ext_'+Date.now(), ...body, registered_at:new Date().toISOString(), status:'pending'}); localStorage.setItem(LS,JSON.stringify(STATE.list)); }
  openDetail(id); render();
}
async function recordPayment(id){
  const body = { amount:+document.getElementById('payAmt').value||0, method:document.getElementById('payMethod').value||'bank', ref:document.getElementById('payRef').value||'' };
  if(body.amount<=0){ alert('Amount must be > 0'); return; }
  try { const r = await fetch(`${API}/${id}/record-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); const out = await r.json(); if(out.contract){ const i=STATE.list.findIndex(x=>x.id===id); STATE.list[i]=out.contract;} }
  catch(_){ const c=STATE.list.find(x=>x.id===id); c.payments=c.payments||[]; c.payments.push({id:'pay_'+Date.now(), ...body, at:new Date().toISOString()}); if(c.status==='draft') c.status='active'; if(M.remaining(c)===0) c.status='completed'; localStorage.setItem(LS,JSON.stringify(STATE.list)); }
  openDetail(id); render();
}

['fSearch','fStatus'].forEach(id=>document.getElementById(id).addEventListener('input', render));

function applyLanguage(lang){
  const d = I18N[lang]; if(!d) return;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n; if(!d[k]) return;
    if (k.endsWith('_html')) el.innerHTML = d[k]; else el.textContent = d[k];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { const k = el.dataset.i18nPlaceholder; if(d[k]) el.setAttribute('placeholder', d[k]); });
  document.body.classList.toggle('lang-ar', lang==='ar');
  localStorage.setItem('nr_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang===lang));
}
document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLanguage(b.dataset.lang)));
applyLanguage(localStorage.getItem('nr_lang') || 'en');

loadList();
