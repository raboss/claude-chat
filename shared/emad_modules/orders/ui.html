<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NouRion · Orders / الأوامر</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Cormorant+Garamond:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#0A0A0B; --bg-ebony:#121315; --bg-carbon:#1A1C20; --bg-ink:#22252A;
    --silver:#B8BCC2; --silver-bright:#E8ECEF; --silver-deep:#6A7075;
    --cyan:#3FA2E0; --amber:#D4A35A; --coral:#E63946; --green:#10B981;
    --text-primary:#EAECEE; --text-soft:#8A8F95; --text-muted:#4E5358;
    --border:rgba(184,188,194,0.15); --border-bright:rgba(184,188,194,0.32);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg-void);color:var(--text-primary);min-height:100vh;font-variant-numeric:lining-nums;font-feature-settings:"lnum" 1;position:relative}
  body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(rgba(184,188,194,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(184,188,194,0.025) 1px,transparent 1px),linear-gradient(rgba(184,188,194,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(184,188,194,0.015) 1px,transparent 1px);
    background-size:80px 80px,80px 80px,20px 20px,20px 20px;
    mask-image:radial-gradient(ellipse at center,black 20%,transparent 85%);
    -webkit-mask-image:radial-gradient(ellipse at center,black 20%,transparent 85%)}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse 900px 600px at 15% 0%,rgba(184,188,194,.06) 0%,transparent 50%),radial-gradient(ellipse 700px 500px at 100% 100%,rgba(63,162,224,.04) 0%,transparent 55%)}
  main,nav,.modal-bg{position:relative;z-index:2}

  nav{position:sticky;top:0;z-index:50;padding:18px 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,11,.78);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border)}
  .nav-brand{display:flex;align-items:center;gap:14px;font-size:18px;font-weight:300;letter-spacing:2px;direction:ltr}
  .nav-brand svg{width:30px;height:30px}
  .nav-brand .name-text{font-weight:500;letter-spacing:.5px}
  .nav-brand .r{font-weight:600;background:linear-gradient(180deg,var(--silver-bright) 0%,var(--silver-deep) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .nav-divider{width:1px;height:18px;background:var(--border);margin:0 10px}
  .nav-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-soft);letter-spacing:2.5px;text-transform:uppercase}
  .tabs{display:flex;gap:6px;align-items:center}
  .tabs a{font-family:'JetBrains Mono',monospace;color:var(--text-soft);text-decoration:none;padding:8px 14px;border-radius:8px;font-size:10.5px;font-weight:500;letter-spacing:2px;text-transform:uppercase;transition:.2s}
  .tabs a:hover{color:var(--silver-bright);background:rgba(184,188,194,.04)}
  .tabs a.active{color:var(--silver-bright);background:rgba(184,188,194,.06);border:1px solid var(--border)}
  .nav-right{display:flex;align-items:center;gap:16px}
  .lang-switcher{display:inline-flex;background:rgba(184,188,194,.04);border:1px solid var(--border);border-radius:100px;padding:3px;gap:2px}
  .lang-btn{padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text-soft);background:transparent;border:none;border-radius:100px;cursor:pointer;transition:.2s}
  .lang-btn:hover{color:var(--text-primary)}
  .lang-btn.active{background:linear-gradient(180deg,var(--silver-bright) 0%,var(--silver) 100%);color:var(--bg-void)}

  main{max-width:1440px;margin:0 auto;padding:40px 32px 80px}
  .page-head{margin-bottom:28px}
  .section-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--silver);display:inline-flex;align-items:center;gap:14px;margin-bottom:14px}
  .section-label .line{width:40px;height:1px;background:linear-gradient(90deg,var(--silver),transparent)}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:400;line-height:1;letter-spacing:-1px;margin-bottom:10px;color:var(--text-primary)}
  .page-title em{font-style:italic;font-weight:500;background:linear-gradient(180deg,var(--silver-bright) 0%,var(--silver) 55%,var(--silver-deep) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .page-sub{color:var(--text-soft);font-size:14px;font-weight:300;max-width:700px;line-height:1.6}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;background:var(--bg-ebony);padding:16px;border-radius:14px;border:1px solid var(--border)}
  input,select,textarea{padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:'Manrope',sans-serif;font-size:13px;background:var(--bg-carbon);color:var(--text-primary);min-width:160px;transition:.2s;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--silver);background:var(--bg-ink)}
  input::placeholder,textarea::placeholder{color:var(--text-muted)}
  .toolbar input,.toolbar select{width:auto}

  .btn{padding:10px 20px;background:linear-gradient(180deg,var(--silver-bright) 0%,var(--silver) 55%,var(--silver-deep) 100%);color:var(--bg-void);font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:8px;cursor:pointer;transition:.3s;display:inline-flex;align-items:center;gap:8px}
  .btn:hover{box-shadow:0 0 24px rgba(184,188,194,.35);transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--text-primary);border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px}
  .btn-ghost:hover{border-color:var(--silver);color:var(--silver-bright);background:rgba(184,188,194,.05);box-shadow:none}
  .btn-danger{background:transparent;color:var(--coral);border:1px solid rgba(230,57,70,.35)}
  .btn-danger:hover{background:rgba(230,57,70,.1);box-shadow:0 0 12px rgba(230,57,70,.25)}
  .btn-success{background:linear-gradient(180deg,#34D399 0%,var(--green) 100%);color:var(--bg-void)}
  .btn-success:hover{box-shadow:0 0 20px rgba(16,185,129,.35)}
  .btn-cyan{background:linear-gradient(180deg,#5FBEF5 0%,var(--cyan) 100%);color:var(--bg-void)}
  .btn-amber{background:linear-gradient(180deg,#E0B876 0%,var(--amber) 100%);color:var(--bg-void)}
  .btn-sm{padding:6px 12px;font-size:10.5px;letter-spacing:1px}

  /* Kanban */
  .kanban{display:grid;grid-template-columns:repeat(4,minmax(260px,1fr));gap:14px;min-height:60vh}
  .col{background:var(--bg-ebony);border-radius:14px;padding:14px;display:flex;flex-direction:column;border:1px solid var(--border);min-height:400px}
  .col.drop-active{border-color:var(--silver);box-shadow:inset 0 0 20px rgba(184,188,194,.08)}
  .col-h{display:flex;justify-content:space-between;align-items:center;padding:4px 6px 14px;border-bottom:1px solid var(--border);margin-bottom:12px}
  .col-h-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-soft)}
  .col-h .ct{font-family:'JetBrains Mono',monospace;background:var(--bg-carbon);color:var(--silver-bright);padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:1px;border:1px solid var(--border)}
  .col.c-draft .col-h-label{color:var(--text-soft)}
  .col.c-sent .col-h-label{color:var(--cyan)}
  .col.c-sent .col-h{border-bottom-color:rgba(63,162,224,.3)}
  .col.c-in_progress .col-h-label{color:var(--amber)}
  .col.c-in_progress .col-h{border-bottom-color:rgba(212,163,90,.3)}
  .col.c-completed .col-h-label{color:var(--green)}
  .col.c-completed .col-h{border-bottom-color:rgba(16,185,129,.3)}
  .col-body{display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;min-height:100px}

  .kcard{background:var(--bg-carbon);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:grab;transition:.25s;user-select:none;position:relative;overflow:hidden}
  .kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--silver-deep),transparent);opacity:.3}
  .kcard:hover{border-color:var(--border-bright);background:var(--bg-ink);transform:translateY(-1px);box-shadow:0 6px 22px rgba(0,0,0,.4)}
  .kcard.dragging{opacity:.4}
  .kcard .t{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .ktype{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:3px 9px;border-radius:99px;border:1px solid transparent}
  .tcut{background:rgba(63,162,224,.12);color:var(--cyan);border-color:rgba(63,162,224,.3)}
  .tmfg{background:rgba(212,163,90,.12);color:var(--amber);border-color:rgba(212,163,90,.3)}
  .tglass{background:rgba(184,188,194,.1);color:var(--silver);border-color:var(--border)}
  .knum{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;color:var(--silver-bright);letter-spacing:1.5px}
  .kinfo{font-size:12px;color:var(--text-soft);margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .kmeta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:6px;letter-spacing:1px;padding-top:8px;border-top:1px solid var(--border)}
  .kprio{display:inline-block;width:7px;height:7px;border-radius:50%;vertical-align:middle;flex-shrink:0}
  .p-low{background:var(--silver-deep);box-shadow:0 0 6px var(--silver-deep)}
  .p-normal{background:var(--cyan);box-shadow:0 0 6px rgba(63,162,224,.6)}
  .p-high{background:var(--amber);box-shadow:0 0 6px rgba(212,163,90,.6)}
  .p-urgent{background:var(--coral);box-shadow:0 0 8px rgba(230,57,70,.8);animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .kactions{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}

  .modal-bg{position:fixed;inset:0;background:rgba(10,10,11,.82);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding:48px 20px;z-index:200;overflow-y:auto}
  .modal-bg.open{display:flex}
  .modal{background:var(--bg-ebony);border:1px solid var(--border);border-radius:16px;max-width:820px;width:100%;padding:32px;box-shadow:0 30px 90px rgba(0,0,0,.6)}
  .modal h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;letter-spacing:-.5px;margin-bottom:18px;color:var(--silver-bright)}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-soft);display:block;margin-bottom:6px;margin-top:12px}
  textarea{min-height:70px;resize:vertical}
  table.lst{width:100%;font-size:12px;margin-top:10px;border-collapse:collapse}
  table.lst th,table.lst td{padding:8px;border:1px solid var(--border);background:var(--bg-carbon)}
  table.lst th{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--text-soft);text-transform:uppercase;text-align:start}
  table.lst input{padding:6px 8px;font-size:12px;min-width:0}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;flex-wrap:wrap;padding-top:20px;border-top:1px solid var(--border)}
  .num{font-family:'JetBrains Mono',monospace;font-weight:500;font-variant-numeric:tabular-nums;direction:ltr !important;unicode-bidi:isolate}

  body.lang-ar,body.lang-ar .modal,body.lang-ar .page-title,body.lang-ar .page-sub,body.lang-ar .tabs a,body.lang-ar .nav-label,body.lang-ar label,body.lang-ar .btn,body.lang-ar .btn-ghost,body.lang-ar th,body.lang-ar td,body.lang-ar .section-label,body.lang-ar input,body.lang-ar select,body.lang-ar textarea,body.lang-ar .col-h-label,body.lang-ar .kinfo,body.lang-ar .kmeta{font-family:'Cairo','Manrope',sans-serif}
  body.lang-ar .page-title,body.lang-ar .page-sub,body.lang-ar .modal h2,body.lang-ar label{direction:rtl;unicode-bidi:isolate}
  body.lang-ar .num{direction:ltr !important;font-family:'JetBrains Mono',monospace}

  @media(max-width:1100px){.kanban{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:700px){.tabs{display:none}main{padding:24px 16px 60px}.grid-2{grid-template-columns:1fr}.kanban{grid-template-columns:1fr}nav{padding:14px 20px}}
</style>
</head>

    <svg viewBox="0 0 80 80">
      <defs><linearGradient id="silGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E8ECEF"/><stop offset="100%" stop-color="#6A7075"/></linearGradient><radialGradient id="nuc"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="50%" stop-color="#E8ECEF"/><stop offset="100%" stop-color="#6A7075"/></radialGradient></defs>
      <g transform="translate(40,40)"><ellipse rx="32" ry="12" fill="none" stroke="url(#silGrad)" stroke-width="1.5" opacity="0.8"/><ellipse rx="32" ry="12" fill="none" stroke="url(#silGrad)" stroke-width="1.5" opacity="0.8" transform="rotate(60)"/><ellipse rx="32" ry="12" fill="none" stroke="url(#silGrad)" stroke-width="1.5" opacity="0.8" transform="rotate(-60)"/><circle cx="32" cy="0" r="2" fill="#E8ECEF"/><circle cx="-16" cy="-27.7" r="2" fill="#E8ECEF"/><circle cx="16" cy="27.7" r="2" fill="#E8ECEF"/><circle r="5" fill="url(#nuc)"/></g>

<main>
  <div class="page-head">
    <div class="section-label"><span class="line"></span><span data-i18n="page_label">IV · Workshop</span></div>
    <h1 class="page-title" data-i18n="page_title_html">Work <em>Orders</em></h1>
    <p class="page-sub" data-i18n="page_sub">Cutting, manufacturing, and glass orders — Kanban orchestration of the atelier floor.</p>
  </div>

  <div class="toolbar">
    <select id="fType">
      <option value="" data-i18n="opt_alltypes">All types</option>
      <option value="cut" data-i18n="opt_cut">Cut</option>
      <option value="mfg" data-i18n="opt_mfg">Manufacturing</option>
      <option value="glass" data-i18n="opt_glass">Glass</option>

    <select id="fPrio">

      <option value="low">low</option><option value="normal">normal</option>

    <input id="fProj" data-i18n-placeholder="ph_proj" placeholder="Project ID" dir="auto">

    <button class="btn btn-amber" onclick="openNewModal('mfg')"><span data-i18n="btn_new_mfg">+ Mfg Order</span></button>
    <button class="btn" onclick="openNewModal('glass')"><span data-i18n="btn_new_glass">+ Glass Order</span></button>
  </div>

  <div class="kanban" id="kanban">
    <div class="col c-draft"      data-status="draft"><div class="col-h"><span class="col-h-label" data-i18n="col_draft">Draft</span><span class="ct" id="c-draft">0</span></div><div class="col-body" data-body="draft"></div></div>
    <div class="col c-sent"       data-status="sent"><div class="col-h"><span class="col-h-label" data-i18n="col_sent">Sent</span><span class="ct" id="c-sent">0</span></div><div class="col-body" data-body="sent"></div></div>
    <div class="col c-in_progress" data-status="in_progress"><div class="col-h"><span class="col-h-label" data-i18n="col_prog">In Progress</span><span class="ct" id="c-in_progress">0</span></div><div class="col-body" data-body="in_progress"></div></div>
    <div class="col c-completed"  data-status="completed"><div class="col-h"><span class="col-h-label" data-i18n="col_done">Completed</span><span class="ct" id="c-completed">0</span></div><div class="col-body" data-body="completed"></div></div>
  </div>
</main>

    </div>
    <div>
      <label data-i18n="lbl_prio">Priority</label><select id="oPrio"><option>low</option><option selected>normal</option><option>high</option><option>urgent</option></select>
      <label data-i18n="lbl_status">Status</label><select id="oStatus"><option>draft</option><option>sent</option><option>in_progress</option><option>completed</option></select>
      <label data-i18n="lbl_notes">Notes</label><input id="oNotes" dir="auto">
    </div>
  </div>

  <div id="form-cut" class="type-form" hidden>
    <label data-i18n="lbl_cutlist">Cut list</label>

let S = { all:[], editing:null };
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function jget(p, fb){ try { const r = await fetch(BASE+p); if(r.ok) return await r.json(); } catch(_){} return fb; }
async function jpost(p, b){ return (await fetch(BASE+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json(); }
async function jpatch(p, b){ return (await fetch(BASE+p,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json(); }

async function loadAll(){
  let all = await jget('/all', null);
  if(!all || !all.length) all = SEED.slice();
  S.all = all;
  const byType = { cut:[], mfg:[], glass:[] };
  S.all.forEach(o => byType[o.type]?.push(o));
  localStorage.setItem('pm_cut_orders',   JSON.stringify(byType.cut));
  localStorage.setItem('pm_mfg_orders',   JSON.stringify(byType.mfg));
  localStorage.setItem('pm_glass_orders', JSON.stringify(byType.glass));
  render();
}

function render(){
  const lang = document.body.classList.contains('lang-ar');
  const tlabel = lang ? {cut:'قص',mfg:'تصنيع',glass:'زجاج'} : {cut:'Cut',mfg:'Mfg',glass:'Glass'};
  const ft = document.getElementById('fType').value;
  const fp = document.getElementById('fPrio').value;
  const fj = document.getElementById('fProj').value.toLowerCase();
  const data = S.all.filter(o => {
    if(ft && o.type !== ft) return false;
    if(fp && o.priority !== fp) return false;
    if(fj && !(o.project_id||'').toLowerCase().includes(fj)) return false;
    return true;
  });
  ['draft','sent','in_progress','completed'].forEach(st => {
    const body = document.querySelector(`[data-body="${st}"]`);
    const rows = data.filter(o => o.status === st);
    document.getElementById('c-'+st).textContent = rows.length;
    body.innerHTML = rows.map(o => renderCard(o, tlabel)).join('') || '<div style="padding:28px 12px;color:var(--text-muted);text-align:center;font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase">—</div>';
    body.ondragover = e => { e.preventDefault(); body.closest('.col').classList.add('drop-active'); };
    body.ondragleave = () => body.closest('.col').classList.remove('drop-active');
    body.ondrop = e => {
      e.preventDefault();
      body.closest('.col').classList.remove('drop-active');
      const id = e.dataTransfer.getData('id');
      dropOrder(id, st);
    };
  });
  document.querySelectorAll('.kcard').forEach(el => {
    el.draggable = true;
    el.addEventListener('dragstart', e => { e.dataTransfer.setData('id', el.dataset.id); el.classList.add('dragging'); });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
  });
}

function renderCard(o, tlabel){
  const tcls = { cut:'tcut', mfg:'tmfg', glass:'tglass' }[o.type] || '';
  const tl = tlabel[o.type] || o.type;
  let body = '';
  if (o.type === 'cut') {
    const s = M.cutSummary(o) || {cuts:0,meters:0};
    body = `<div class="kmeta"><span class="num">${s.cuts}</span> cuts · <span class="num">${s.meters}</span> m</div>`;
  } else if (o.type === 'mfg') {
    body = `<div class="kmeta"><span class="num">${o.frames_count||0}</span> frames</div>`;
  } else if (o.type === 'glass') {
    const q = (o.items||[]).reduce((a,i)=>a+(+i.qty||0),0);
    body = `<div class="kmeta"><span class="num">${q}</span> pcs · ${esc(o.supplier||'')}</div>`;
  }
  return `<div class="kcard" data-id="${o.id}">
    <div class="t"><span class="ktype ${tcls}">${tl}</span><span class="knum">${esc(o.number)}</span></div>
    <div class="kinfo"><span class="kprio p-${o.priority||'normal'}"></span><span>${esc(o.project_id||'—')} · ${esc(o.assigned_to||'—')}</span></div>
    ${body}
    <div class="kactions">
      <button class="btn btn-ghost btn-sm" onclick="viewOrder('${o.id}')" title="View">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button class="btn btn-danger btn-sm" onclick="delOrder('${o.id}','${o.type}')" title="Delete">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      </button>
    </div>
  </div>`;
}

async function dropOrder(id, newStatus){
  const o = S.all.find(x=>x.id===id); if(!o || o.status===newStatus) return;
  if (!M.canTransition(o.status, newStatus)) {
    alert(`Cannot transition from ${o.status} to ${newStatus}`); return;
  }
  try { const upd = await jpatch(`/${o.type}/${id}`, {status:newStatus}); if(!upd.error){ Object.assign(o, upd); } else alert(upd.error); }
  catch(_){ o.status = newStatus; }
  render();
}

function openNewModal(type, existing){
  const lang = document.body.classList.contains('lang-ar');
  const tname = lang ? {cut:'قص',mfg:'تصنيع',glass:'زجاج'} : {cut:'Cut',mfg:'Manufacturing',glass:'Glass'};
  const e = existing || M.normalize({type}, String(S.all.length+1).padStart(4,'0'));
  S.editing = e;
  document.getElementById('newTitle').textContent = (existing?(lang?'تعديل ':'Edit '):(lang?'أمر جديد — ':'New Order — ')) + tname[type];
  document.getElementById('oNum').value    = e.number||'';
  document.getElementById('oAssign').value = e.assigned_to||'';
  document.getElementById('oProj').value   = e.project_id||'';
  document.getElementById('oPrio').value   = e.priority||'normal';
  document.getElementById('oStatus').value = e.status||'draft';
  document.getElementById('oNotes').value  = e.notes||'';
  document.querySelectorAll('.type-form').forEach(f=>f.hidden=true);
  document.getElementById('form-'+type).hidden = false;

  if (type === 'cut') {
    if(!e.cut_list || !e.cut_list.length) e.cut_list = [{profile:'', length:0, qty:1, angles:'45/45'}];
    renderCut();
  } else if (type === 'mfg') {
    document.getElementById('mSpec').value   = e.assembly_specs||'';
    document.getElementById('mFrames').value = e.frames_count||1;
    document.getElementById('mGlass').value  = e.glass_list||'';
  } else if (type === 'glass') {
    if(!e.items || !e.items.length) e.items = [{type:'6mm Clear', width:0, height:0, qty:1}];
    document.getElementById('gSupp').value = e.supplier||'';
    document.getElementById('gEta').value  = e.eta||'';
    renderGlass();
  }
  document.getElementById('mNew').classList.add('open');
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function renderCut(){
  const tb = document.querySelector('#cutTbl tbody');
  tb.innerHTML = S.editing.cut_list.map((r,i)=>`
    <tr>
      <td><input value="${esc(r.profile||'')}" oninput="S.editing.cut_list[${i}].profile=this.value" dir="auto"></td>
      <td><input type="number" step="0.01" value="${r.length||0}" oninput="S.editing.cut_list[${i}].length=+this.value"></td>
      <td><input type="number" value="${r.qty||0}" oninput="S.editing.cut_list[${i}].qty=+this.value"></td>
      <td><input value="${esc(r.angles||'')}" oninput="S.editing.cut_list[${i}].angles=this.value"></td>
      <td><button class="btn btn-ghost btn-sm" onclick="S.editing.cut_list.splice(${i},1);renderCut()">×</button></td>
    </tr>`).join('');
}
function renderGlass(){
  const tb = document.querySelector('#glassTbl tbody');
  tb.innerHTML = S.editing.items.map((r,i)=>`
    <tr>
      <td><input value="${esc(r.type||'')}" oninput="S.editing.items[${i}].type=this.value" dir="auto"></td>
      <td><input type="number" value="${r.width||0}" oninput="S.editing.items[${i}].width=+this.value"></td>
      <td><input type="number" value="${r.height||0}" oninput="S.editing.items[${i}].height=+this.value"></td>
      <td><input type="number" value="${r.qty||0}" oninput="S.editing.items[${i}].qty=+this.value"></td>
      <td><button class="btn btn-ghost btn-sm" onclick="S.editing.items.splice(${i},1);renderGlass()">×</button></td>
    </tr>`).join('');
}
function addLine(kind){
  if(kind==='cut'){ S.editing.cut_list.push({profile:'', length:0, qty:1, angles:''}); renderCut(); }
  if(kind==='glass'){ S.editing.items.push({type:'', width:0, height:0, qty:1}); renderGlass(); }
}

async function saveOrder(){
  const e = S.editing;
  e.assigned_to = document.getElementById('oAssign').value||null;
  e.project_id  = document.getElementById('oProj').value||null;
  e.priority    = document.getElementById('oPrio').value;
  e.status      = document.getElementById('oStatus').value;
  e.notes       = document.getElementById('oNotes').value;
  if(e.type==='mfg'){ e.assembly_specs=document.getElementById('mSpec').value; e.frames_count=+document.getElementById('mFrames').value||0; e.glass_list=document.getElementById('mGlass').value; }
  if(e.type==='glass'){ e.supplier=document.getElementById('gSupp').value; e.eta=document.getElementById('gEta').value; }
  const v = M.validate(e); if(!v.ok){ alert(v.errors.join('\n')); return; }
  try {
    let saved;
    if (e.id && !/^ord_\d+$/.test(e.id)) {
      saved = await jpatch(`/${e.type}/${e.id}`, e);
    } else if (e.id) {
      saved = await jpatch(`/${e.type}/${e.id}`, e);
    } else {
      saved = await jpost(`/${e.type}`, e);
    }
    if(saved && !saved.error){
      const i = S.all.findIndex(x=>x.id===saved.id);
      if (i>=0) S.all[i] = saved; else S.all.push(saved);
    } else if(saved?.error) alert(saved.error);
  } catch(_){
    if(!e.id) e.id = 'ord_'+Date.now();
    e.created_at = e.created_at || new Date().toISOString();
    e.updated_at = new Date().toISOString();
    const i = S.all.findIndex(x=>x.id===e.id); if(i>=0) S.all[i]=e; else S.all.push(e);
  }
  closeModal('mNew'); render();
}
function viewOrder(id){ const o = S.all.find(x=>x.id===id); if(o) openNewModal(o.type, JSON.parse(JSON.stringify(o))); }
async function delOrder(id, type){
  if(!confirm('Delete this order?')) return;
  try{ await fetch(`${BASE}/${type}/${id}`,{method:'DELETE'}); }catch(_){}
  S.all = S.all.filter(x=>x.id!==id);
  render();
}

['fType','fPrio','fProj'].forEach(id=>document.getElementById(id).addEventListener('input', render));

function applyLanguage(lang){
  const d = I18N[lang]; if(!d) return;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n; if(!d[k]) return;
    if (k.endsWith('_html')) el.innerHTML = d[k]; else el.textContent = d[k];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { const k = el.dataset.i18nPlaceholder; if(d[k]) el.setAttribute('placeholder', d[k]); });
  document.body.classList.toggle('lang-ar', lang==='ar');
  localStorage.setItem('nr_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang===lang));
  if (S.all.length) render();
}
document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLanguage(b.dataset.lang)));
loadAll().then(() => applyLanguage(localStorage.getItem('nr_lang') || 'en'));
