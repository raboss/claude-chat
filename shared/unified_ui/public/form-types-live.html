<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NouRion — أنواع النماذج</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/nourion-tokens.css">
  <link rel="stylesheet" href="assets/css/nourion-base.css">
  <link rel="stylesheet" href="assets/css/nourion-components.css">
  <script src="assets/js/nourion-theme.js"></script>
  <script src="../src/services/repository.js"></script>
  <script src="../src/services/crud-service.js"></script>
  <script src="assets/js/nourion-i18n.js"></script>
  <script src="assets/js/live-page.js"></script>
  <script src="assets/js/live-page-shell.js"></script>
  <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg">
</head>
<body>
<script>
  window.__livePageConfig = {
    title: 'NouRion — أنواع النماذج',
    titleText: 'أنواع النماذج · Form Types',
    listTitle: 'قائمة أنواع النماذج',
    nav: 'form-types',
    key: 'pm_nourion_form_types',
    ServiceClass: window.NouRionCrudService.FormTypeService,
    entityLabel: 'نوع نموذج',
    searchable: true,
    columns: [
      { field: 'code',        label: 'الرمز',     mono: true, align: 'center' },
      { field: 'name',        label: 'الاسم' },
      { field: 'category',    label: 'التصنيف' },
      { field: 'description', label: 'الوصف' }
    ],
    filters: [
      { field: 'category', label: 'التصنيف' }
    ],
    formFields: [
      { field: 'name',        label: 'الاسم',    type: 'text', required: true, full: true, placeholder: 'اسم النموذج' },
      { field: 'code',        label: 'الرمز',    type: 'text', placeholder: 'MEAS / DLVY / ...' },
      { field: 'category',    label: 'التصنيف',  type: 'text', placeholder: 'قياس / تركيب / صيانة' },
      { field: 'description', label: 'الوصف',    type: 'textarea', full: true, placeholder: 'وصف مختصر للنموذج' }
    ],
    statsFn: function (svc) {
      var s = svc.stats();
      var cats = Object.keys(s.by_category || {}).length;
      return [
        { label: 'إجمالي النماذج', value: s.total, trend: 'عدد الأنواع' },
        { label: 'التصنيفات',        value: cats,    trend: 'فئات مختلفة' },
        { label: 'قياس',              value: (s.by_category && s.by_category['قياس']) || 0 },
        { label: 'تركيب',             value: (s.by_category && s.by_category['تركيب']) || 0 }
      ];
    },
    seed: [
      { name: 'نموذج رفع مقاسات',       code: 'MEAS', category: 'قياس',  description: 'يُستخدم عند الزيارة الأولى لرفع مقاسات الموقع' },
      { name: 'نموذج تسليم',             code: 'DLVY', category: 'تركيب', description: 'يُوقّع عليه العميل عند تسليم المشروع' },
      { name: 'نموذج صيانة دورية',       code: 'MAINT', category: 'صيانة', description: 'يُستخدم في زيارات الصيانة الدورية' },
      { name: 'نموذج معاينة موقع',       code: 'INSP', category: 'قياس',  description: 'معاينة أوّلية قبل عرض السعر' }
    ]
  };
  document.addEventListener('DOMContentLoaded', function () {
    window.NouRionLivePageShell.init();
  });
</script>
</body>
</html>
