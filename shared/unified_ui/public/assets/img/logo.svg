<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 104" role="img" aria-label="NouRion">
  <title>NouRion</title>
  <desc>NouRion brand wordmark — Space Grotesk, electric-blue R, atomic mark at the end</desc>

  <defs>
    <linearGradient id="nr-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f4f5f8"/>
      <stop offset="50%"  stop-color="#c4c6cd"/>
      <stop offset="100%" stop-color="#74787f"/>
    </linearGradient>
    <linearGradient id="nr-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5cd8ff"/>
      <stop offset="55%"  stop-color="#0099ff"/>
      <stop offset="100%" stop-color="#0062c4"/>
    </linearGradient>
    <filter id="nr-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .nr-word {
        font-family: 'Space Grotesk','Inter','Segoe UI',system-ui,sans-serif;
        font-size: 64px;
        font-feature-settings: 'kern' 1, 'liga' 1, 'ss01' 1;
        font-kerning: normal;
      }
      .nr-light { font-weight: 300; }
      .nr-bold  { font-weight: 700; }
      .nr-tag {
        font-family: 'Space Grotesk','Inter',system-ui,sans-serif;
        font-size: 8.4px;
        font-weight: 500;
        letter-spacing: 4.2px;
      }
    </style>
  </defs>

  <!-- Subtle technical baseline grid -->
  <g opacity="0.16" stroke="#4dd4ff" stroke-width="0.5">
    <line x1="14" y1="76" x2="366" y2="76"/>
    <line x1="14" y1="22" x2="366" y2="22" stroke-dasharray="2 4"/>
  </g>

  <!-- ============ Wordmark ============ -->
  <text x="14" y="72" class="nr-word" letter-spacing="-2.6">
    <tspan class="nr-light" fill="url(#nr-silver)">Nou</tspan><tspan class="nr-bold"  fill="url(#nr-blue)"   filter="url(#nr-glow)" dx="-1">R</tspan><tspan class="nr-light" fill="url(#nr-silver)" dx="-1">ion</tspan>
  </text>

  <!-- ============ ATOMIC MARK — placed at the end of the wordmark ============ -->
  <g transform="translate(258,50)">
    <!-- Orbital ring 1 -->
    <ellipse cx="0" cy="0" rx="22" ry="7.5"
             fill="none"
             stroke="url(#nr-blue)"
             stroke-width="1.8"
             transform="rotate(-22)"
             opacity="0.9"/>
    <!-- Orbital ring 2 -->
    <ellipse cx="0" cy="0" rx="22" ry="7.5"
             fill="none"
             stroke="url(#nr-blue)"
             stroke-width="1.1"
             transform="rotate(32)"
             opacity="0.55"/>
    <!-- Orbital ring 3 -->
    <ellipse cx="0" cy="0" rx="22" ry="7.5"
             fill="none"
             stroke="url(#nr-blue)"
             stroke-width="0.8"
             transform="rotate(90)"
             opacity="0.35"/>
    <!-- Nucleus glow -->
    <circle cx="0" cy="0" r="6.5" fill="url(#nr-blue)" filter="url(#nr-glow)"/>
    <!-- Nucleus core -->
    <circle cx="0" cy="0" r="3.2" fill="#eaffff"/>
    <!-- Orbiting electrons -->
    <circle cx="20" cy="-8"  r="1.8" fill="#5cd8ff"/>
    <circle cx="-18" cy="9"  r="1.5" fill="#5cd8ff" opacity="0.85"/>
    <circle cx="4"   cy="-22" r="1.2" fill="#eaffff" opacity="0.9"/>
  </g>

  <!-- Tagline -->
  <text x="16" y="96" class="nr-tag" fill="#7a8190">SMART · INDUSTRIAL · PLATFORM</text>
</svg>
