<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Glass: bright sky at top fading to deep teal -->
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e0f7ff"/>
      <stop offset="20%"  stop-color="#7dd3fc"/>
      <stop offset="55%"  stop-color="#0ea5c9"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <!-- Diagonal panel: slightly warmer teal -->
    <linearGradient id="g2" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%"   stop-color="#bae6fd"/>
      <stop offset="25%"  stop-color="#38bdf8"/>
      <stop offset="65%"  stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <!-- Glass reflection streak (left-bright) -->
    <linearGradient id="rf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#fff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <!-- Diagonal reflection -->
    <linearGradient id="rd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <!-- Accent bar -->
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0284c7"/>
      <stop offset="50%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <!-- Clip paths for window grid -->
    <clipPath id="cl"><polygon points="48,450 138,450 164,62 74,62"/></clipPath>
    <clipPath id="cr"><polygon points="362,450 452,450 426,62 336,62"/></clipPath>
    <clipPath id="cd"><polygon points="164,62 254,62 362,450 272,450"/></clipPath>
    <!-- Glow behind buildings -->
    <filter id="gw" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#06090e"/>

  <!-- Soft glow bloom -->
  <polygon points="48,450 138,450 164,62 74,62"   fill="#38bdf8" opacity="0.13" filter="url(#gw)"/>
  <polygon points="362,450 452,450 426,62 336,62"  fill="#38bdf8" opacity="0.13" filter="url(#gw)"/>
  <polygon points="164,62 254,62 362,450 272,450"  fill="#0ea5c9" opacity="0.09" filter="url(#gw)"/>

  <!-- ── LEFT TOWER ── -->
  <polygon points="48,450 138,450 164,62 74,62" fill="url(#g1)"/>
  <g clip-path="url(#cl)" opacity="0.30">
    <line x1="36" y1="132" x2="176" y2="132" stroke="#0c4a6e" stroke-width="1.5"/>
    <line x1="36" y1="202" x2="176" y2="202" stroke="#0c4a6e" stroke-width="1.5"/>
    <line x1="36" y1="272" x2="176" y2="272" stroke="#0c4a6e" stroke-width="1.5"/>
    <line x1="36" y1="342" x2="176" y2="342" stroke="#0c4a6e" stroke-width="1.5"/>
    <line x1="36" y1="404" x2="176" y2="404" stroke="#0c4a6e" stroke-width="1.5"/>
    <line x1="111" y1="50" x2="111" y2="462" stroke="#0c4a6e" stroke-width="1.2"/>
  </g>
  <!-- Bright reflection streak -->
  <polygon points="48,450 78,450 104,62 74,62" fill="url(#rf)"/>
  <!-- Rooftop edge -->
  <line x1="74" y1="62" x2="164" y2="62" stroke="#e0f7ff" stroke-width="3" opacity="0.85"/>
  <!-- Right catchlight -->
  <line x1="164" y1="62" x2="138" y2="450" stroke="#7dd3fc" stroke-width="1.8" opacity="0.5"/>
  <!-- Left base -->
  <line x1="48" y1="450" x2="74" y2="62" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>

  <!-- ── RIGHT TOWER ── -->
  <polygon points="362,450 452,450 426,62 336,62" fill="url(#g1)"/>
  <g clip-path="url(#cr)" opacity="0.30">
    <line x1="350" y1="132" x2="464" y2="132" stroke="#0c4a6e" stroke-width="1.5"/>
    <line x1="350" y1="202" x2="464" y2="202" stroke="#0c4a6e" stroke-width="1.5"/>
    <line x1="350" y1="272" x2="464" y2="272" stroke="#0c4a6e" stroke-width="1.5"/>
    <line x1="350" y1="342" x2="464" y2="342" stroke="#0c4a6e" stroke-width="1.5"/>
    <line x1="350" y1="404" x2="464" y2="404" stroke="#0c4a6e" stroke-width="1.5"/>
    <line x1="407" y1="50" x2="407" y2="462" stroke="#0c4a6e" stroke-width="1.2"/>
  </g>
  <!-- Bright reflection streak (right side, mirrored) -->
  <polygon points="422,62 452,450 422,450 392,62" fill="url(#rf)"/>
  <!-- Rooftop edge -->
  <line x1="336" y1="62" x2="426" y2="62" stroke="#e0f7ff" stroke-width="3" opacity="0.85"/>
  <!-- Left catchlight -->
  <line x1="362" y1="450" x2="336" y2="62" stroke="#7dd3fc" stroke-width="1.8" opacity="0.5"/>

  <!-- ── DIAGONAL N-STROKE ── -->
  <polygon points="164,62 254,62 362,450 272,450" fill="url(#g2)"/>
  <g clip-path="url(#cd)" opacity="0.28">
    <line x1="150" y1="168" x2="375" y2="168" stroke="#0c4a6e" stroke-width="1.5"/>
    <line x1="165" y1="278" x2="390" y2="278" stroke="#0c4a6e" stroke-width="1.5"/>
    <line x1="180" y1="388" x2="390" y2="388" stroke="#0c4a6e" stroke-width="1.5"/>
  </g>
  <!-- Diagonal reflection -->
  <polygon points="164,62 204,62 312,450 272,450" fill="url(#rd)"/>
  <!-- Diagonal rooftop edge -->
  <line x1="164" y1="62" x2="254" y2="62" stroke="#bae6fd" stroke-width="2.5" opacity="0.75"/>

  <!-- ── BRAND ACCENT BAR ── -->
  <rect x="48" y="462" width="416" height="5.5" rx="2.8" fill="url(#bar)" opacity="0.95"/>
</svg>
